  epr-azure-stub:
    image: defradigital/epr-azure-stub:${EPR_AZURE_STUB:-latest}
    pull_policy: always
    env_file:
      - 'compose/cdp/aws.env'
      - 'compose/cdp/dotnet-service.env'
    ports:
      - "8011:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    profiles:
      - packaging
      - obligations

  epr-regulator-facade:
    pull_policy: always
    image: devrwdinfac1401.azurecr.io/eprregulatorfacadeendregistry:${EPR_REGULATOR_FACADE:-main-latest}
    user: "0" # needed to elevate root user so cert can be trusted
    depends_on:
      epr-backend-account-microservice:
        condition: service_healthy
      epr-pom-api-submission-status:
        condition: service_started
      epr-common-data-api:
        condition: service_healthy
      epr-prn-common-backend:
        condition: service_healthy
      wiremock:
        condition: service_started
    environment:
      ASPNETCORE_URLS: http://+:8080;https://+:8081
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: password
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Microsoft.AspNetCore: Information
      AzureAdB2C__ClientId: ${EprRegulatorFacade__AzureAdB2C__ClientId} # see .env
      AzureAdB2C__Instance: https://AZDCUSPOC2.b2clogin.com
      AzureAdB2C__Domain: AZDCUSPOC2.onmicrosoft.com
      AzureAdB2C__SignUpSignInPolicyId: B2C_1A_EPR_SignUpSignIn
      AccountsServiceApiConfig__BaseUrl: https://epr-backend-account-microservice:8081/api/
      SubmissionsApiConfig__BaseUrl: https://epr-pom-api-submission-status:8081
      CommonDataApiConfig__BaseUrl: http://epr-common-data-api:8080/api/
      PrnBackendServiceApiConfig__BaseUrl: http://epr-prn-common-backend:8080
      PaymentBackendServiceApiConfig__BaseUrl: http://wiremock
      MessagingConfig__ApiKey: ${EprRegulatorFacade__MessagingConfig__ApiKey} # see .env
    ports:
      - "5072:8080"
      - "7240:8081"
    volumes:
      - ./compose/certs/https:/https:ro
      - ./compose/certs/init-container.sh:/init-container.sh:ro
    entrypoint: [ "/init-container.sh" ]
    command: [ "dotnet", "EPR.RegulatorService.Facade.API.dll" ]
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "https://localhost:8081/admin/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    profiles:
      - regulator

  epr-regulator-service:
    pull_policy: always
    image: devrwdinfac1401.azurecr.io/eprregulatorfrontendregistry:${EPR_REGULATOR_SERVICE:-main-latest}
    user: "0" # needed to elevate root user so cert can be trusted
    depends_on:
      redis:
        condition: service_healthy
      epr-regulator-facade:
        condition: service_healthy
      epr-payment-facade:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080;https://+:8081
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: password
      ASPNETCORE_ENVIRONMENT: Development
      Logging__LogLevel__Microsoft.AspNetCore: Information
      RedisInstanceName: epr-producers-
      ConnectionStrings__REDIS_CONNECTION: redis:6379
      UseLocalSession: false
      AzureAdB2C__ClientId: ${EprRegulatorService__AzureAdB2C__ClientId} # see .env
      AzureAdB2C__ClientSecret: ${EprRegulatorService__AzureAdB2C__ClientSecret} # see .env
      AzureAdB2C__Instance: https://AZDCUSPOC2.b2clogin.com
      AzureAdB2C__Domain: AZDCUSPOC2.onmicrosoft.com
      FacadeApi__BaseUrl: https://epr-regulator-facade:8081/api/
      EprAuthorizationConfig__FacadeBaseUrl: https://epr-regulator-facade:8081/api/
      ReprocessorExporterFacadeApi__BaseUrl: https://epr-regulator-facade:8081/api/
      PaymentFacadeApi__BaseUrl: https://epr-payment-facade:8081/
    ports:
      - "5229:8080" # taken from launch settings in epr-regulator-service
      - "7154:8081" # taken from launch settings in epr-regulator-service
    volumes:
      - ./compose/certs/https:/https:ro
      - ./compose/certs/init-container.sh:/init-container.sh:ro
    entrypoint: [ "/init-container.sh" ]
    command: [ "dotnet", "EPR.RegulatorService.Frontend.Web.dll" ]
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "https://localhost:8081/admin/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    profiles:
      - regulator

  epr-regulator-gateway:
    image: defradigital/epr-regulator-gateway:${EPR_REGULATOR_GATEWAY:-latest}
    pull_policy: always
    depends_on:
      epr-backend-account-microservice:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      BackendAccountService__BaseUrl: http://epr-backend-account-microservice:8080/
      BackendAccountService__Scope: ""  # disables OAuth on outbound calls to the backend as per appsettings.Development.json in the repo https://github.com/DEFRA/epr-regulator-gateway/blob/444b18a5bcfa752d13cbb87c14607777ffbdc40e/EprRegulatorGateway/appsettings.Development.json#L27-L35
      Acl__Clients__Developer__Type: ApiKey
      Acl__Clients__Developer__Secret: developer-rpd
      Acl__Clients__Developer__Scopes__0: read
      Acl__Clients__Developer__Scopes__1: write
    ports:
      - "8085:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    profiles:
      - regulator

