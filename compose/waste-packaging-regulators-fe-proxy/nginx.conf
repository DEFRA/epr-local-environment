events {}

http {
  # Docker's embedded DNS, re-resolved every 10s so we survive upstream recreation
  resolver 127.0.0.11 valid=10s;

  server {
    listen 443 ssl;

    ssl_certificate     /certs/aspnetapp.crt;
    ssl_certificate_key /certs/aspnetapp.key;

    location / {
      # Hostname must be a variable for nginx to re-resolve at request time
      set $upstream waste-packaging-regulators-fe;
      proxy_pass http://$upstream:3000;

      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
